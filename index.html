<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Lily WhatsApp Lead Gen</title>
  <meta name="theme-color" content="#1796E6" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-card card">
        <img src="assets/logo.jpg" alt="Blue Lily Properties" class="brand-logo" />
        <div>
          <h1>Blue Lily</h1>
          <p>WhatsApp Lead Gen</p>
        </div>
      </div>

      <div class="card section-card">
        <h2>Connection</h2>
        <p class="auto-note">Backend is pre-connected automatically.</p>
        <input id="backendUrl" class="input hidden" type="text" />
        <div class="button-row">
          <button id="syncBtn" class="btn btn-primary">Sync Now</button>
        </div>
        <p id="connectionStatus" class="status-text">Waiting to sync.</p>
      </div>

      <div class="card section-card filters-card">
        <h2>Filters</h2>
        <label class="label" for="searchInput">Search contacts</label>
        <input id="searchInput" class="input" type="text" placeholder="Name, number, suburb, street, complex" />
        <div class="filter-grid">
          <div>
            <label class="label" for="suburbFilter">Suburb</label>
            <select id="suburbFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="streetFilter">Street</label>
            <select id="streetFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="complexFilter">Complex</label>
            <select id="complexFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="agencyFilter">Agency</label>
            <select id="agencyFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="statusFilter">Status</label>
            <select id="statusFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="intentFilter">Intent</label>
            <select id="intentFilter" class="input select"></select>
          </div>
          <div>
            <label class="label" for="assignedFilter">Assigned To</label>
            <select id="assignedFilter" class="input select"></select>
          </div>
        </div>
        <div class="button-row">
          <button id="loadBtn" class="btn btn-primary">Load Contacts</button>
          <button id="clearBtn" class="btn btn-ghost">Clear</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <section class="card header-card">
        <div>
          <h2>Contacts</h2>
          <p>Connected to Blue Lily Properties.</p>
        </div>
        <div class="stats-grid">
          <div class="stat-box"><span>Total</span><strong id="statTotal">0</strong></div>
          <div class="stat-box"><span>New</span><strong id="statNew">0</strong></div>
          <div class="stat-box"><span>Follow Up</span><strong id="statFollow">0</strong></div>
          <div class="stat-box"><span>Remove</span><strong id="statRemove">0</strong></div>
        </div>
      </section>

      <section id="messageBar" class="card message-bar hidden"></section>
      <section id="contactsContainer" class="contacts-grid"></section>
    </main>
  </div>

  <script>window.DEFAULT_BACKEND_URL = 'https://script.google.com/macros/s/AKfycby8_ztOajJqYYFQ9CMLJEGKYhus_ECuX8ea03JTtoRtBuEFPsT98SQwGPNeIlO4fIRo/exec';</script>
  <script src="app.js"></script>
</body>
</html>
