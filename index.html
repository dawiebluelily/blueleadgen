<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1796E6" />
  <title>Blue Lily Lead Gen</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand-card">
        <img src="assets/blue-lily-logo.jpg" alt="Blue Lily Properties logo" class="logo" />
        <div>
          <h1>Blue Lily</h1>
          <p>WhatsApp Lead Gen</p>
        </div>
      </div>

      <section class="panel">
        <h2>Connection</h2>
        <label class="label" for="apiUrl">Apps Script URL</label>
        <input id="apiUrl" class="input" type="text" />
        <div class="row actions-row">
          <button id="saveApiBtn" class="btn secondary">Save URL</button>
          <button id="syncBtn" class="btn primary">Sync</button>
        </div>
        <p id="connectionStatus" class="helper">Ready</p>
      </section>

      <section class="panel">
        <h2>Filters</h2>
        <label class="label" for="searchInput">Search contacts</label>
        <input id="searchInput" class="input" type="text" placeholder="Name, phone, suburb, street, complex" />

        <div class="filters-grid">
          <div>
            <label class="label">Suburb</label>
            <select id="suburbFilter" class="input"><option value="">All suburbs</option></select>
          </div>
          <div>
            <label class="label">Street</label>
            <select id="streetFilter" class="input"><option value="">All streets</option></select>
          </div>
          <div>
            <label class="label">Complex</label>
            <select id="complexFilter" class="input"><option value="">All complexes</option></select>
          </div>
          <div>
            <label class="label">Agency</label>
            <select id="agencyFilter" class="input"><option value="">All agencies</option></select>
          </div>
          <div>
            <label class="label">Status</label>
            <select id="statusFilter" class="input"><option value="">All statuses</option></select>
          </div>
          <div>
            <label class="label">Intent</label>
            <select id="intentFilter" class="input"><option value="">All intents</option></select>
          </div>
          <div>
            <label class="label">Assigned To</label>
            <select id="assignedFilter" class="input"><option value="">All agents</option></select>
          </div>
        </div>

        <div class="row actions-row">
          <button id="loadBtn" class="btn primary">Load Contacts</button>
          <button id="clearBtn" class="btn secondary">Clear</button>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="hero panel">
        <div>
          <h2>Contacts</h2>
          <p id="heroText">Your contacts will show here once synced.</p>
        </div>
        <div class="stats">
          <div class="stat"><span>Total</span><strong id="statTotal">0</strong></div>
          <div class="stat"><span>New</span><strong id="statNew">0</strong></div>
          <div class="stat"><span>Follow Up</span><strong id="statFollow">0</strong></div>
          <div class="stat"><span>Remove</span><strong id="statRemove">0</strong></div>
        </div>
      </section>

      <section id="cards" class="cards"></section>
    </main>
  </div>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-head">
        <div>
          <h3 class="name"></h3>
          <p class="address"></p>
        </div>
        <span class="pill status-pill"></span>
      </div>

      <div class="meta-grid"></div>

      <div class="editor-grid">
        <div>
          <label class="label">Assigned To</label>
          <select class="input assigned-select"></select>
        </div>
        <div>
          <label class="label">Message Sender</label>
          <select class="input sender-select"></select>
        </div>
        <div>
          <label class="label">Intent</label>
          <select class="input intent-select"></select>
        </div>
        <div>
          <label class="label">Status</label>
          <select class="input status-select"></select>
        </div>
        <div class="full-span">
          <label class="label">WhatsApp Script</label>
          <textarea class="input message-preview" rows="4" readonly></textarea>
        </div>
        <div class="full-span">
          <label class="label">Notes</label>
          <textarea class="input notes-input" rows="3" placeholder="Type notes here"></textarea>
        </div>
      </div>

      <div class="row actions-row wrap">
        <button class="btn whatsapp-btn">WhatsApp</button>
        <button class="btn secondary copy-btn">Copy Script</button>
        <button class="btn primary save-btn">Save</button>
        <button class="btn secondary contacted-btn">Save + Contacted</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
